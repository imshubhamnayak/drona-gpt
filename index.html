<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drona GPT</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Leaflet CSS (for Strategy X Map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .tab-active {
            background-color: #334155;
            color: white;
            border-radius: 9999px;
        }
        .mobile-card {
            transition: all 0.2s ease;
        }
        .mobile-card:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

    <!-- ==================== HEADER ==================== -->
    <header class="border-b border-slate-800 bg-slate-900 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 md:px-6">
            <div class="flex items-center justify-between h-16">
               
                <!-- Logo -->
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-orange-600 rounded-2xl flex items-center justify-center">
                        <span class="font-bold text-white text-xl">D</span>
                    </div>
                    <span class="font-semibold text-xl tracking-tight">Drona GPT</span>
                </div>

                <!-- Tab Navigation -->
                <div class="flex items-center bg-slate-800 p-1 rounded-2xl">
                    <button onclick="switchTab('drona-gpt')"
                            id="tab-drona-gpt"
                            class="tab-active px-5 md:px-6 py-2 text-sm font-medium flex items-center gap-x-2">
                        <i class="fa-solid fa-comments"></i>
                        <span class="hidden sm:inline">Drona GPT</span>
                    </button>
                  <button onclick="switchTab('strategy-x')"
                      id="tab-strategy-x"
                      class="px-5 md:px-6 py-2 text-sm font-medium flex items-center gap-x-2 hover:bg-slate-700 rounded-2xl transition-all">
                      <i class="fa-solid fa-map-marked"></i>
                      <span class="hidden sm:inline">Strategy X</span>
                  </button>
                </div>

                <!-- User Info -->
                <div id="user-info" class="flex items-center gap-x-3"></div>
            </div>
        </div>
    </header>
<!-- ==================== DRONA GPT VIEW ==================== -->
<div id="drona-gpt-view" class="max-w-2xl mx-auto p-4 md:p-6 flex flex-col h-screen">

 <!-- Dynamic Header -->
<div class="mb-5 flex-shrink-0">
    <h2 id="greeting-main" class="text-3xl font-semibold"></h2>
    <p id="greeting-sub" class="text-slate-400 mt-1"></p>
</div>

    <!-- Quick Actions -->
    <div class="grid grid-cols-2 gap-4 mb-5 flex-shrink-0">
        <button onclick="openRetailerSearch()" class="mobile-card bg-slate-900 hover:bg-slate-800 border border-slate-700 p-5 rounded-3xl text-left">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-orange-600/20 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-search text-orange-400 text-xl"></i>
                </div>
                <div>
                    <div class="font-semibold">Search Retailer</div>
                    <div class="text-xs text-slate-400">Find details quickly</div>
                </div>
            </div>
        </button>

        <button onclick="showPublishedPlan()" class="mobile-card bg-slate-900 hover:bg-slate-800 border border-slate-700 p-5 rounded-3xl text-left">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-emerald-600/20 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-calendar-check text-emerald-400 text-xl"></i>
                </div>
                <div>
                    <div class="font-semibold">Today's Plan</div>
                    <div class="text-xs text-emerald-400">Auto-published by Admin</div>
                </div>
            </div>
        </button>

        <button onclick="openSKUIntelligence()" class="mobile-card bg-slate-900 hover:bg-slate-800 border border-slate-700 p-5 rounded-3xl text-left">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-orange-600/20 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-tags text-orange-400 text-xl"></i>
                </div>
                <div>
                    <div class="font-semibold">SKU Intelligence</div>
                    <div class="text-xs text-slate-400">Pricing & talking points</div>
                </div>
            </div>
        </button>

        <button onclick="showMyTargets()" class="mobile-card bg-slate-900 hover:bg-slate-800 border border-slate-700 p-5 rounded-3xl text-left">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-orange-600/20 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-chart-line text-orange-400 text-xl"></i>
                </div>
                <div>
                    <div class="font-semibold">Target</div>
                    <div class="text-xs text-slate-400">View your reach</div>
                </div>
            </div>
        </button>
    </div>

    <!-- Chat Section - EVEN TALLER -->
    <div class="bg-slate-900 border border-slate-700 rounded-3xl p-5 flex flex-col flex-1 min-h-0" style="min-height: 420px;">
        
        <!-- Chat Header -->
        <div class="flex items-center gap-x-3 mb-4 flex-shrink-0">
            <div class="w-10 h-10 bg-orange-600 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-robot text-white"></i>
            </div>
            <div>
                <div class="font-semibold">Drona GPT</div>
                <div class="text-xs text-emerald-400">Online • Always Ready</div>
            </div>
        </div>

        <!-- Chat Messages - Maximized Height -->
        <div id="chat-messages" class="flex-1 overflow-y-auto mb-4 space-y-4 pr-2 custom-scroll" style="min-height: 320px;">
            <!-- Welcome message added by JS -->
        </div>

        <!-- Input -->
        <div class="flex gap-2 flex-shrink-0">
            <input id="chat-input" type="text" placeholder="Ask about any retailer, target or SKU..." 
                   class="flex-1 bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 text-sm focus:outline-none"
                   onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" 
                    class="px-6 bg-orange-600 hover:bg-orange-500 rounded-2xl">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>
<!-- Strategy X View -->
<div id="strategy-x-view" class="hidden flex flex-col h-[calc(100vh-140px)]">
    <!-- Top Summary Cards -->
    <div class="grid grid-cols-4 gap-4 p-6 bg-slate-900 border-b border-slate-700">
        <div class="bg-slate-800 rounded-3xl p-5">
            <div class="text-slate-400 text-sm">Total Retailers</div>
            <div class="text-4xl font-bold" id="total-retailers">200</div>
        </div>
        <div class="bg-emerald-900/30 border border-emerald-500 rounded-3xl p-5">
            <div class="text-emerald-400 text-sm">Monthly Revenue</div>
            <div class="text-4xl font-bold" id="total-revenue">₹2.8 Cr</div>
            <div class="text-xs text-emerald-400">93% of ₹3.0 Cr target</div>
        </div>
        <div class="bg-orange-900/30 border border-orange-500 rounded-3xl p-5">
            <div class="text-orange-400 text-sm">High Outstanding</div>
            <div class="text-4xl font-bold" id="high-os">47</div>
            <div class="text-xs text-orange-400">Retailers need urgent visit</div>
        </div>
        <div class="bg-blue-900/30 border border-blue-500 rounded-3xl p-5">
            <div class="text-blue-400 text-sm">Focus Areas</div>
            <div class="text-4xl font-bold" id="focus-areas">8</div>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <!-- Map -->
        <div class="flex-1 relative" style="min-width: 65%;">
            <div id="strategy-map" class="absolute inset-0"></div>
        </div>

        <!-- Sidebar Dashboard -->
        <div class="w-96 bg-slate-900 border-l border-slate-700 flex flex-col overflow-hidden">
            <div class="p-4 border-b flex gap-1">
                <button onclick="switchStrategyTab(0)" id="stab-0" class="tab-active flex-1 py-3 text-sm font-medium">Focus Plans</button>
                <button onclick="switchStrategyTab(1)" id="stab-1" class="flex-1 py-3 text-sm font-medium">Targets</button>
                <button onclick="switchStrategyTab(2)" id="stab-2" class="flex-1 py-3 text-sm font-medium">Territories</button>
            </div>
            <div id="strategy-tab-content" class="flex-1 overflow-auto p-4"></div>
        </div>
    </div>
</div>
    
    <!-- ==================== SCRIPTS ==================== -->
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Leaflet JS (for Map) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
      <!-- Main Scripts -->
        <script src="js/main.js"></script>
    <script src="js/strategy-x.js"></script>

    <!-- EMERGENCY FIX -->
    <script>
        console.log("%c[Emergency Fix] Running...", "color:red; font-weight:bold");

        window.addEventListener('load', function() {
            // Force attach all functions
            if (typeof initializeStrategyX === 'function') window.initializeStrategyX = initializeStrategyX;
            if (typeof switchStrategyTab === 'function') window.switchStrategyTab = switchStrategyTab;
            if (typeof createFocusPlanForArea === 'function') window.createFocusPlanForArea = createFocusPlanForArea;
            
            console.log("%c[Emergency Fix] Functions attached", "color:lime");
        });
    </script>
</body>
</html>
