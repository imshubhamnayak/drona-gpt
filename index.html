<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drona GPT</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Leaflet CSS (for Strategy X Map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .tab-active {
            background-color: #334155;
            color: white;
            border-radius: 9999px;
        }
        .mobile-card {
            transition: all 0.2s ease;
        }
        .mobile-card:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

    <!-- ==================== HEADER ==================== -->
    <header class="border-b border-slate-800 bg-slate-900 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 md:px-6">
            <div class="flex items-center justify-between h-16">
               
                <!-- Logo -->
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-orange-600 rounded-2xl flex items-center justify-center">
                        <span class="font-bold text-white text-xl">D</span>
                    </div>
                    <span class="font-semibold text-xl tracking-tight">Drona GPT</span>
                </div>

                <!-- Tab Navigation -->
                <div class="flex items-center bg-slate-800 p-1 rounded-2xl">
                    <button onclick="switchTab('drona-gpt')"
                            id="tab-drona-gpt"
                            class="tab-active px-5 md:px-6 py-2 text-sm font-medium flex items-center gap-x-2">
                        <i class="fa-solid fa-comments"></i>
                        <span class="hidden sm:inline">Drona GPT</span>
                    </button>
                    <button onclick="switchTab('strategy-x')"
                            id="tab-strategy-x"
                            class="px-5 md:px-6 py-2 text-sm font-medium flex items-center gap-x-2 hover:bg-slate-700 rounded-2xl transition-all">
                        <i class="fa-solid fa-map-marked"></i>
                        <span class="hidden sm:inline">Strategy X</span>
                    </button>
                </div>

                <!-- User Info -->
                <div id="user-info" class="flex items-center gap-x-3"></div>
            </div>
        </div>
    </header>

<!-- ==================== DRONA GPT VIEW ==================== -->
<div id="drona-gpt-view" class="max-w-2xl mx-auto p-4 md:p-6">
   
    <div class="mb-8">
        <h2 class="text-3xl font-semibold">Good morning, Ramesh</h2>
        <p class="text-slate-400 mt-1">Ready for today's field visits?</p>
    </div>

    <!-- Quick Actions -->
    <div class="grid grid-cols-2 gap-4 mb-8">
        <button onclick="openRetailerSearch()" class="mobile-card bg-slate-900 hover:bg-slate-800 active:bg-slate-700 border border-slate-700 p-6 rounded-3xl text-left">
            <div class="w-12 h-12 bg-orange-600/20 rounded-2xl flex items-center justify-center mb-4">
                <i class="fa-solid fa-search text-orange-400 text-2xl"></i>
            </div>
            <div class="font-semibold text-lg">Search Retailer</div>
            <div class="text-sm text-slate-400 mt-1">Find retailer details quickly</div>
        </button>

        <button onclick="showTargetSummary()" class="mobile-card bg-slate-900 hover:bg-slate-800 active:bg-slate-700 border border-slate-700 p-6 rounded-3xl text-left">
            <div class="w-12 h-12 bg-orange-600/20 rounded-2xl flex items-center justify-center mb-4">
                <i class="fa-solid fa-list-check text-orange-400 text-2xl"></i>
            </div>
            <div class="font-semibold text-lg">Target</div>
            <div class="text-sm text-slate-400 mt-1">View your reach</div>
        </button>

       <button onclick="openSKUIntelligence()" 
            class="mobile-card bg-slate-900 hover:bg-slate-800 active:bg-slate-700 border border-slate-700 p-5 rounded-3xl text-left">
        <div class="flex items-center gap-3 mb-3">
            <div class="w-11 h-11 bg-orange-600/20 rounded-2xl flex items-center justify-center flex-shrink-0">
                <i class="fa-solid fa-tags text-orange-400 text-xl"></i>
            </div>
            <div>
                <div class="font-semibold text-lg">SKU Intelligence</div>
                <div class="text-xs text-slate-400">Pricing, gaps & talking points</div>
            </div>
        </div>
    </button>

    <!-- Today's Plan (Auto-published) -->
    <button onclick="showTargetSummary()" 
            class="mobile-card bg-slate-900 hover:bg-slate-800 active:bg-slate-700 border border-slate-700 p-5 rounded-3xl text-left">
        <div class="flex items-center gap-3 mb-3">
            <div class="w-11 h-11 bg-emerald-600/20 rounded-2xl flex items-center justify-center flex-shrink-0">
                <i class="fa-solid fa-calendar-check text-emerald-400 text-xl"></i>
            </div>
            <div class="flex-1">
                <div class="font-semibold text-lg">Today's Plan</div>
                <div class="text-xs text-emerald-400">Auto-published by Admin</div>
            </div>
        </div>
    </button>

    <!-- Chat Section - Made Much Taller -->
    <div class="bg-slate-900 border border-slate-700 rounded-3xl p-6 flex flex-col" style="height: 520px;">
        <div class="flex items-center gap-x-3 mb-4 flex-shrink-0">
            <div class="w-10 h-10 bg-orange-600 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-robot text-white"></i>
            </div>
            <div>
                <div class="font-semibold">Drona GPT</div>
                <div class="text-xs text-emerald-400">Online • Always Ready</div>
            </div>
        </div>
       
        <!-- Chat Messages - Now Much Taller -->
        <div id="chat-messages" class="flex-1 overflow-y-auto mb-4 space-y-4 pr-2 custom-scroll">
            <!-- Welcome message will be added by JS -->
        </div>

        <div class="flex gap-2 flex-shrink-0">
            <input id="chat-input" type="text" placeholder="Ask anything about retailers, targets, SKUs..." 
                   class="flex-1 bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 text-sm focus:outline-none"
                   onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" 
                    class="px-5 bg-orange-600 hover:bg-orange-500 active:bg-orange-700 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>
    <!-- ==================== STRATEGY X VIEW ==================== -->
    <div id="strategy-x-view" class="hidden max-w-7xl mx-auto p-6">
        <div class="flex flex-col md:flex-row md:items-end md:justify-between mb-6 gap-4">
            <div>
                <h2 class="text-3xl font-semibold">Strategy X</h2>
                <p class="text-slate-400">Territory intelligence & focus planning</p>
            </div>
            <button onclick="createFocusPlanForTerritory(1)" 
                    class="px-6 py-3 bg-orange-600 hover:bg-orange-500 rounded-2xl font-medium flex items-center gap-x-2 w-fit">
                <i class="fa-solid fa-plus"></i>
                <span>Create Focus Plan</span>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Territory Map -->
            <div class="lg:col-span-8 bg-slate-900 border border-slate-700 rounded-3xl p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-semibold">Territory Map</h3>
                    <div class="text-xs px-3 py-1 bg-slate-800 rounded-full">7 Territories</div>
                </div>
                <div id="strategy-map" class="h-[420px] bg-slate-800 rounded-2xl"></div>
            </div>

            <!-- Right Sidebar -->
            <div class="lg:col-span-4 space-y-6">
                
                <!-- Active Focus Plans -->
                <div class="bg-slate-900 border border-slate-700 rounded-3xl p-6">
                    <h3 class="font-semibold mb-4 flex items-center gap-x-2">
                        <i class="fa-solid fa-bullseye text-orange-400"></i>
                        <span>Active Focus Plans</span>
                    </h3>
                    <div id="active-plans-list" class="text-sm text-slate-400 min-h-[80px]">
                        Loading plans...
                    </div>
                </div>

                <!-- Territory List -->
                <div class="bg-slate-900 border border-slate-700 rounded-3xl p-6">
                    <h3 class="font-semibold mb-4">Territories</h3>
                    <div id="territory-list" class="max-h-[280px] overflow-y-auto space-y-1 text-sm"></div>
                </div>
            </div>
        </div>

        <!-- Territory Details Panel -->
        <div id="territory-details-panel" 
             class="hidden mt-6 bg-slate-900 border border-slate-700 rounded-3xl p-6 max-w-2xl mx-auto"></div>
    </div>

    <!-- ==================== SCRIPTS ==================== -->
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Leaflet JS (for Map) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Main App Logic -->
    <script src="js/main.js"></script>
    
    <!-- Strategy X Logic -->
    <script src="js/strategy-x.js"></script>
</body>
</html>
