<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drona GPT • TTK Prestige</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-950 text-slate-200">
    
    <!-- Top Navigation Bar -->
    <div class="border-b border-slate-800 bg-slate-900 sticky top-0 z-40">
        <div class="max-w-screen-xl mx-auto px-6">
            <div class="flex items-center justify-between h-16">
                
                <!-- Logo -->
                <div class="flex items-center gap-x-3">
                    <div class="w-10 h-10 bg-orange-600 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-robot text-white text-2xl"></i>
                    </div>
                    <div>
                        <span class="font-semibold text-2xl tracking-tight">Drona GPT</span>
                        <span class="ml-2 text-xs px-2.5 py-1 bg-slate-800 text-slate-400 rounded-full align-middle">TTK Prestige</span>
                    </div>
                </div>

                <!-- Search + User -->
                <div class="flex items-center gap-x-3">
                    
                    <!-- Search Retailer Button -->
                    <button onclick="openRetailerSearch()" 
                            class="flex items-center gap-x-2 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 transition-colors px-5 py-2.5 rounded-2xl text-sm font-medium">
                        <i class="fa-solid fa-search mr-2"></i>
                        <span>Search Retailer</span>
                    </button>

                    <!-- User Info -->
                    <div class="flex items-center gap-x-3 bg-slate-900 border border-slate-700 pl-2 pr-4 py-1.5 rounded-2xl">
                        <div class="w-9 h-9 bg-emerald-600 rounded-full flex items-center justify-center text-sm font-bold">RK</div>
                        <div class="leading-tight">
                            <div class="text-sm font-medium">Ramesh Kumar</div>
                            <div class="text-[10px] text-slate-500 -mt-0.5">JP Nagar Beat</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-screen-xl mx-auto px-6 pt-6 pb-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Chat Section -->
            <div class="lg:col-span-7 bg-slate-900 border border-slate-800 rounded-3xl flex flex-col h-[calc(100vh-140px)] shadow-xl">
                
                <!-- Chat Header -->
                <div class="px-6 py-4 border-b border-slate-800 flex items-center justify-between">
                    <div>
                        <div class="font-semibold text-lg flex items-center gap-x-2">
                            Drona GPT
                            <span class="text-emerald-400 text-xs px-2 py-0.5 bg-emerald-900/40 rounded-full">Online</span>
                        </div>
                        <div class="text-xs text-slate-400">Your AI Sales Intelligence Assistant</div>
                    </div>
                    
                    <!-- Context Indicator -->
                    <div id="context-indicator" 
                         class="hidden items-center gap-x-2 text-xs bg-slate-800 px-3 py-1.5 rounded-2xl border border-slate-700">
                        <span class="text-emerald-400">Context:</span> 
                        <span id="context-name" class="font-medium text-white"></span>
                        <button onclick="clearContext()" 
                                class="ml-1 text-slate-400 hover:text-white transition-colors">×</button>
                    </div>
                </div>

                <!-- Messages Area -->
                <div id="chat-messages" 
                     class="flex-1 p-6 overflow-y-auto chat-container space-y-4 text-sm">
                    <!-- Messages populated by JS -->
                </div>

                <!-- Chat Input -->
                <div class="p-4 border-t border-slate-800 bg-slate-900 rounded-b-3xl">
                    <div class="flex gap-x-2">
                        <input id="chat-input" 
                               type="text" 
                               placeholder="Ask anything... e.g. Which retailers are behind on payment?"
                               class="flex-1 bg-slate-800 border border-slate-700 focus:border-orange-600 transition-colors rounded-2xl px-5 py-3 text-sm outline-none">
                        
                        <button onclick="sendMessage()" 
                                class="bg-orange-600 hover:bg-orange-500 active:bg-orange-700 transition-colors px-7 rounded-2xl font-medium flex items-center justify-center">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                    <div class="text-[10px] text-slate-500 mt-2 px-1">
                        Try: "Payment status of Sharma Kirana" or "Show declining SKUs"
                    </div>
                </div>
            </div>

            <!-- Right Sidebar - Quick Actions -->
            <div class="lg:col-span-5 space-y-4">
                
                <div class="bg-slate-900 border border-slate-800 rounded-3xl p-5">
                    <div class="text-xs uppercase tracking-[1px] text-slate-500 mb-4 px-1">Quick Actions</div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="showPaymentSummary()" 
                                class="flex items-center gap-x-3 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 p-4 rounded-2xl text-left transition-colors">
                            <i class="fa-solid fa-wallet text-amber-400 w-5"></i>
                            <div>
                                <div class="text-sm font-medium">Payment Summary</div>
                            </div>
                        </button>
                        
                        <button onclick="showTargetSummary()" 
                                class="flex items-center gap-x-3 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 p-4 rounded-2xl text-left transition-colors">
                            <i class="fa-solid fa-chart-line text-emerald-400 w-5"></i>
                            <div>
                                <div class="text-sm font-medium">Targets &amp; Schemes</div>
                            </div>
                        </button>
                        
                        <button onclick="showSamplingView()" 
                                class="flex items-center gap-x-3 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 p-4 rounded-2xl text-left transition-colors">
                            <i class="fa-solid fa-flask text-violet-400 w-5"></i>
                            <div>
                                <div class="text-sm font-medium">Sampling Status</div>
                            </div>
                        </button>
                        
                        <button onclick="showAllRetailers()" 
                                class="flex items-center gap-x-3 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 p-4 rounded-2xl text-left transition-colors">
                            <i class="fa-solid fa-store text-sky-400 w-5"></i>
                            <div>
                                <div class="text-sm font-medium">All Retailers</div>
                            </div>
                        </button>
                    </div>
                </div>

                <!-- Today's Insight Card -->
                <div class="bg-slate-900 border border-slate-800 rounded-3xl p-5 text-sm">
                    <div class="text-xs uppercase tracking-widest text-slate-500 mb-2">Today's Insight</div>
                    <div class="text-slate-300">
                        7 retailers have declining orders on Pressure Cookers. 
                        <span onclick="highlightDecliningRetailers()" 
                              class="text-orange-400 hover:underline cursor-pointer">View them →</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/app.js"></script>
</body>
</html>
