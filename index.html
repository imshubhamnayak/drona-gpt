<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drona GPT • TTK Prestige</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-950 text-slate-200">

    <!-- Top Bar -->
    <div class="border-b border-slate-800 bg-slate-900">
        <div class="max-w-screen-xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-orange-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-robot text-white text-2xl"></i>
                </div>
                <div>
                    <span class="font-semibold text-2xl tracking-tight">Drona GPT</span>
                    <span class="ml-2 text-xs px-2.5 py-1 bg-slate-800 text-slate-400 rounded-full">TTK Prestige</span>
                </div>
            </div>

            <div class="flex items-center gap-x-3">
                <!-- Search Retailer -->
                <button onclick="openRetailerSearch()" 
                        class="flex items-center gap-x-2 bg-slate-800 hover:bg-slate-700 px-5 py-2 rounded-2xl text-sm font-medium">
                    <i class="fa-solid fa-search mr-2"></i>
                    <span>Search Retailer</span>
                </button>

                <!-- User -->
                <div class="flex items-center gap-x-2 bg-slate-900 border border-slate-700 pl-2 pr-4 py-1.5 rounded-2xl">
                    <div class="w-9 h-9 bg-emerald-600 rounded-full flex items-center justify-center text-sm font-bold">RK</div>
                    <div>
                        <div class="text-sm font-medium">Ramesh Kumar</div>
                        <div class="text-[10px] text-slate-500 -mt-0.5">JP Nagar Beat</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-screen-xl mx-auto px-6 pt-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Chat -->
            <div class="lg:col-span-7 bg-slate-900 border border-slate-800 rounded-3xl flex flex-col h-[calc(100vh-140px)]">
                <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center">
                    <div>
                        <div class="font-semibold">Drona GPT</div>
                        <div class="text-xs text-emerald-400">Online • Your sales intelligence</div>
                    </div>
                    
                    <div id="context-indicator" class="hidden items-center gap-x-2 text-xs bg-slate-800 px-3 py-1 rounded-2xl">
                        <span class="text-emerald-400">Context:</span> 
                        <span id="context-name" class="font-medium"></span>
                        <button onclick="clearContext()" class="text-slate-400 hover:text-white ml-1">×</button>
                    </div>
                </div>

                <div id="chat-messages" class="flex-1 p-6 overflow-y-auto chat-container space-y-4 text-sm"></div>

                <div class="p-4 border-t border-slate-800">
                    <div class="flex gap-x-2">
                        <input id="chat-input" type="text" placeholder="Ask anything..." 
                               class="flex-1 bg-slate-800 border border-slate-700 rounded-2xl px-5 py-3 text-sm focus:outline-none"
                               onkeypress="if(event.key === 'Enter') sendMessage()">
                        <button onclick="sendMessage()" 
                                class="bg-orange-600 hover:bg-orange-500 px-7 rounded-2xl font-medium">Send</button>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="lg:col-span-5 space-y-4">
                <div class="bg-slate-900 border border-slate-800 rounded-3xl p-5">
                    <div class="text-xs uppercase tracking-widest text-slate-500 mb-3">Quick Actions</div>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="showPaymentSummary()" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl text-sm text-left">Payment Summary</button>
                        <button onclick="showTargetSummary()" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl text-sm text-left">Targets &amp; Schemes</button>
                        <button onclick="showSamplingView()" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl text-sm text-left">Sampling Status</button>
                        <button onclick="showAllRetailers()" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl text-sm text-left">All Retailers</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
