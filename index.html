<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drona GPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .tab-active {
            background-color: #334155;
            color: white;
            border-radius: 9999px;
        }
        .mobile-card {
            transition: all 0.2s ease;
        }
        .mobile-card:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-900 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 md:px-6">
            <div class="flex items-center justify-between h-16">
               
                <!-- Logo -->
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-orange-600 rounded-2xl flex items-center justify-center">
                        <span class="font-bold text-white text-xl">D</span>
                    </div>
                    <span class="font-semibold text-xl tracking-tight">Drona GPT</span>
                </div>

                <!-- Tabs -->
                <div class="flex items-center bg-slate-800 p-1 rounded-2xl">
                    <button onclick="switchTab('drona-gpt')"
                            id="tab-drona-gpt"
                            class="tab-active px-5 md:px-6 py-2 text-sm font-medium flex items-center gap-x-2">
                        <i class="fa-solid fa-comments"></i>
                        <span class="hidden sm:inline">Drona GPT</span>
                    </button>
                    <button onclick="switchTab('strategy-x')"
                            id="tab-strategy-x"
                            class="px-5 md:px-6 py-2 text-sm font-medium flex items-center gap-x-2 hover:bg-slate-700 rounded-2xl transition-all">
                        <i class="fa-solid fa-map-marked"></i>
                        <span class="hidden sm:inline">Strategy X</span>
                    </button>
                </div>

                <!-- User Info -->
                <div id="user-info" class="flex items-center gap-x-3"></div>
            </div>
        </div>
    </header>

    <!-- ==================== DRONA GPT VIEW ==================== -->
    <div id="drona-gpt-view" class="max-w-2xl mx-auto p-4 md:p-6">
       
        <div class="mb-8">
            <h2 class="text-3xl font-semibold">Good morning, Ramesh</h2>
            <p class="text-slate-400 mt-1">Ready for today's field visits?</p>
        </div>

        <!-- Quick Actions -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="openRetailerSearch()"
                    class="mobile-card bg-slate-900 hover:bg-slate-800 active:bg-slate-700 border border-slate-700 p-6 rounded-3xl text-left">
                <div class="w-12 h-12 bg-orange-600/20 rounded-2xl flex items-center justify-center mb-4">
                    <i class="fa-solid fa-search text-orange-400 text-2xl"></i>
                </div>
                <div class="font-semibold text-lg">Search Retailer</div>
                <div class="text-sm text-slate-400 mt-1">Find retailer details quickly</div>
            </button>

            <button onclick="showTargetSummary()"
                    class="mobile-card bg-slate-900 hover:bg-slate-800 active:bg-slate-700 border border-slate-700 p-6 rounded-3xl text-left">
                <div class="w-12 h-12 bg-orange-600/20 rounded-2xl flex items-center justify-center mb-4">
                    <i class="fa-solid fa-list-check text-orange-400 text-2xl"></i>
                </div>
                <div class="font-semibold text-lg">Today's Plan</div>
                <div class="text-sm text-slate-400 mt-1">View your daily tasks</div>
            </button>
        </div>

        <!-- Chat -->
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-6">
            <div class="flex items-center gap-x-3 mb-4">
                <div class="w-10 h-10 bg-orange-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-robot text-white"></i>
                </div>
                <div>
                    <div class="font-semibold">Drona GPT</div>
                    <div class="text-xs text-emerald-400">Online</div>
                </div>
            </div>
           
            <div id="chat-messages" class="min-h-[120px] max-h-[200px] overflow-y-auto mb-4"></div>

            <div class="flex gap-2">
                <input id="chat-input" type="text" placeholder="Type your message..." 
                       class="flex-1 bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 text-sm"
                       onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()" class="px-5 bg-orange-600 hover:bg-orange-500 rounded-2xl">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== STRATEGY X VIEW ==================== -->
    <div id="strategy-x-view" class="hidden max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h2 class="text-3xl font-semibold">Strategy X</h2>
                <p class="text-slate-400">Territory intelligence & focus planning</p>
            </div>
            <button class="px-6 py-3 bg-orange-600 hover:bg-orange-500 rounded-2xl font-medium flex items-center gap-x-2">
                <i class="fa-solid fa-plus"></i>
                <span>Create Focus Plan</span>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-8 bg-slate-900 border border-slate-700 rounded-3xl p-6">
                <h3 class="font-semibold mb-4">Territory Map</h3>
                <div id="strategy-map" class="h-[420px] bg-slate-800 rounded-2xl"></div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="bg-slate-900 border border-slate-700 rounded-3xl p-6">
                    <h3 class="font-semibold mb-4">Active Focus Plans</h3>
                    <div id="active-plans-list" class="text-sm text-slate-400">No active plans yet.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/main.js"></script>
</body>
</html>
