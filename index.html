<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drona GPT</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Leaflet CSS (for Strategy X Map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .tab-active {
            background-color: #334155;
            color: white;
            border-radius: 9999px;
        }
        .mobile-card {
            transition: all 0.2s ease;
        }
        .mobile-card:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

    <!-- ==================== HEADER ==================== -->
    <header class="border-b border-slate-800 bg-slate-900 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 md:px-6">
            <div class="flex items-center justify-between h-16">
               
                <!-- Logo -->
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-orange-600 rounded-2xl flex items-center justify-center">
                        <span class="font-bold text-white text-xl">D</span>
                    </div>
                    <span class="font-semibold text-xl tracking-tight">Drona GPT</span>
                </div>

                <!-- Tab Navigation -->
                <div class="flex items-center bg-slate-800 p-1 rounded-2xl">
                    <button onclick="switchTab('drona-gpt')"
                            id="tab-drona-gpt"
                            class="tab-active px-5 md:px-6 py-2 text-sm font-medium flex items-center gap-x-2">
                        <i class="fa-solid fa-comments"></i>
                        <span class="hidden sm:inline">Drona GPT</span>
                    </button>
                    <button onclick="switchTab('strategy-x')"
                            id="tab-strategy-x"
                            class="px-5 md:px-6 py-2 text-sm font-medium flex items-center gap-x-2 hover:bg-slate-700 rounded-2xl transition-all">
                        <i class="fa-solid fa-map-marked"></i>
                        <span class="hidden sm:inline">Strategy X</span>
                    </button>
                </div>

                <!-- User Info -->
                <div id="user-info" class="flex items-center gap-x-3"></div>
            </div>
        </div>
    </header>
<!-- ==================== DRONA GPT VIEW ==================== -->
<div id="drona-gpt-view" class="max-w-2xl mx-auto p-4 md:p-6 flex flex-col h-screen">

 <!-- Dynamic Header -->
<div class="mb-5 flex-shrink-0">
    <h2 id="greeting-main" class="text-3xl font-semibold"></h2>
    <p id="greeting-sub" class="text-slate-400 mt-1"></p>
</div>

    <!-- Quick Actions -->
    <div class="grid grid-cols-2 gap-4 mb-5 flex-shrink-0">
        <button onclick="openRetailerSearch()" class="mobile-card bg-slate-900 hover:bg-slate-800 border border-slate-700 p-5 rounded-3xl text-left">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-orange-600/20 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-search text-orange-400 text-xl"></i>
                </div>
                <div>
                    <div class="font-semibold">Search Retailer</div>
                    <div class="text-xs text-slate-400">Find details quickly</div>
                </div>
            </div>
        </button>

        <button onclick="showPublishedPlan()" class="mobile-card bg-slate-900 hover:bg-slate-800 border border-slate-700 p-5 rounded-3xl text-left">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-emerald-600/20 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-calendar-check text-emerald-400 text-xl"></i>
                </div>
                <div>
                    <div class="font-semibold">Today's Plan</div>
                    <div class="text-xs text-emerald-400">Auto-published by Admin</div>
                </div>
            </div>
        </button>

        <button onclick="openSKUIntelligence()" class="mobile-card bg-slate-900 hover:bg-slate-800 border border-slate-700 p-5 rounded-3xl text-left">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-orange-600/20 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-tags text-orange-400 text-xl"></i>
                </div>
                <div>
                    <div class="font-semibold">SKU Intelligence</div>
                    <div class="text-xs text-slate-400">Pricing & talking points</div>
                </div>
            </div>
        </button>

        <button onclick="showTargetSummary()" class="mobile-card bg-slate-900 hover:bg-slate-800 border border-slate-700 p-5 rounded-3xl text-left">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-orange-600/20 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-chart-line text-orange-400 text-xl"></i>
                </div>
                <div>
                    <div class="font-semibold">Target</div>
                    <div class="text-xs text-slate-400">View your reach</div>
                </div>
            </div>
        </button>
    </div>

    <!-- Chat Section - EVEN TALLER -->
    <div class="bg-slate-900 border border-slate-700 rounded-3xl p-5 flex flex-col flex-1 min-h-0" style="min-height: 420px;">
        
        <!-- Chat Header -->
        <div class="flex items-center gap-x-3 mb-4 flex-shrink-0">
            <div class="w-10 h-10 bg-orange-600 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-robot text-white"></i>
            </div>
            <div>
                <div class="font-semibold">Drona GPT</div>
                <div class="text-xs text-emerald-400">Online • Always Ready</div>
            </div>
        </div>

        <!-- Chat Messages - Maximized Height -->
        <div id="chat-messages" class="flex-1 overflow-y-auto mb-4 space-y-4 pr-2 custom-scroll" style="min-height: 320px;">
            <!-- Welcome message added by JS -->
        </div>

        <!-- Input -->
        <div class="flex gap-2 flex-shrink-0">
            <input id="chat-input" type="text" placeholder="Ask about any retailer, target or SKU..." 
                   class="flex-1 bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 text-sm focus:outline-none"
                   onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" 
                    class="px-6 bg-orange-600 hover:bg-orange-500 rounded-2xl">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>
<!-- Strategy X View -->
<div id="strategy-x-view" class="hidden min-h-screen flex flex-col">
    <div class="p-6 border-b border-slate-700 flex items-center justify-between bg-slate-900">
        <div>
            <h1 class="text-3xl font-bold">Strategy X</h1>
            <p class="text-slate-400">Territory Intelligence & Focus Planning</p>
        </div>
        <button onclick="createNewFocusPlan()" 
                class="px-6 py-3 bg-orange-600 hover:bg-orange-500 rounded-2xl font-semibold flex items-center gap-2">
            <i class="fa-solid fa-plus"></i>
            Create New Focus Plan
        </button>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <!-- Left: Map -->
        <div class="flex-1 p-6 border-r border-slate-700 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-lg">Territory Map</h3>
                <span id="retailer-count" class="text-sm text-slate-400"></span>
            </div>
            <div id="strategy-map" class="flex-1 rounded-3xl overflow-hidden border border-slate-700"></div>
        </div>

        <!-- Right Sidebar -->
        <div class="w-96 bg-slate-900 flex flex-col">
            <!-- Active Focus Plans -->
            <div class="p-6 border-b border-slate-700">
                <h4 class="font-medium mb-3 flex items-center gap-2">
                    <span class="text-orange-400">●</span> Active Focus Plans
                </h4>
                <div id="active-plans" class="space-y-3 text-sm">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Territories List -->
            <div class="flex-1 overflow-y-auto p-6">
                <h4 class="font-medium mb-4">Territories</h4>
                <div id="territory-list" class="space-y-2"></div>
            </div>

            <!-- Territory Details Panel -->
            <div id="territory-details-panel" class="hidden border-t border-slate-700 p-6 bg-slate-950"></div>
        </div>
    </div>
</div>

    <!-- ==================== SCRIPTS ==================== -->
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Leaflet JS (for Map) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Main App Logic -->
    <script src="js/main.js"></script>
    
    <!-- Strategy X Logic -->
    <script src="js/strategy-x.js"></script>
</body>
</html>
