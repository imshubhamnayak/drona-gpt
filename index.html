<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drona GPT • TTK Prestige</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-950 text-slate-200">

    <!-- Top Navigation -->
    <div class="border-b border-slate-800 bg-slate-900 sticky top-0 z-50">
        <div class="max-w-screen-xl mx-auto px-6">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-x-3">
                    <div class="w-10 h-10 bg-orange-600 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-robot text-white text-2xl"></i>
                    </div>
                    <div>
                        <span class="font-semibold text-2xl tracking-tight">Drona GPT</span>
                        <span class="ml-2 text-xs px-2.5 py-1 bg-slate-800 text-slate-400 rounded-full">TTK Prestige</span>
                    </div>
                </div>

                <!-- Main Tabs -->
                <div class="flex items-center bg-slate-800 rounded-2xl p-1">
                    <button onclick="switchTab('drona-gpt')" id="tab-drona-gpt"
                            class="tab-button active px-6 py-2 rounded-2xl text-sm font-medium">Drona GPT</button>
                    <button onclick="switchTab('strategy-x')" id="tab-strategy-x"
                            class="tab-button px-6 py-2 rounded-2xl text-sm font-medium">Strategy X</button>
                </div>

                <div class="flex items-center gap-x-2 bg-slate-900 border border-slate-700 pl-2 pr-4 py-1.5 rounded-2xl">
                    <div class="w-9 h-9 bg-emerald-600 rounded-full flex items-center justify-center text-sm font-bold">RK</div>
                    <div>
                        <div class="text-sm font-medium">Ramesh Kumar</div>
                        <div class="text-[10px] text-slate-500 -mt-0.5">JP Nagar Beat</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== DRONA GPT SECTION ==================== -->
    <div id="section-drona-gpt" class="max-w-screen-xl mx-auto px-6 pt-6">
        
        <!-- Sub Tabs -->
        <div class="flex items-center gap-x-2 mb-4 border-b border-slate-800 pb-2">
            <button onclick="switchDronaSubTab('chat')" id="subtab-chat"
                    class="subtab-button active px-5 py-2 text-sm font-medium">Chat</button>
            <button onclick="switchDronaSubTab('retailers')" id="subtab-retailers"
                    class="subtab-button px-5 py-2 text-sm font-medium">Retailers</button>
            <button onclick="switchDronaSubTab('sku-intelligence')" id="subtab-sku"
                    class="subtab-button px-5 py-2 text-sm font-medium">SKU Intelligence</button>
        </div>

        <!-- Chat -->
        <div id="drona-sub-chat">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <!-- Chat Window -->
                <div class="lg:col-span-7 bg-slate-900 border border-slate-800 rounded-3xl flex flex-col h-[calc(100vh-200px)]">
                    <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center">
                        <div>
                            <div class="font-semibold">Drona GPT</div>
                            <div class="text-xs text-emerald-400">Online • Your sales intelligence</div>
                        </div>
                        <div id="context-indicator" class="hidden items-center gap-x-2 text-xs bg-slate-800 px-3 py-1 rounded-2xl">
                            <span class="text-emerald-400">Context:</span> 
                            <span id="context-name" class="font-medium"></span>
                            <button onclick="clearContext()" class="text-slate-400 hover:text-white ml-1">×</button>
                        </div>
                    </div>

                    <div id="chat-messages" class="flex-1 p-6 overflow-y-auto chat-container space-y-4 text-sm"></div>

                    <div class="p-4 border-t border-slate-800">
                        <div class="flex gap-x-2">
                            <input id="chat-input" type="text" placeholder="Ask anything..." 
                                   class="flex-1 bg-slate-800 border border-slate-700 rounded-2xl px-5 py-3 text-sm focus:outline-none"
                                   onkeypress="if(event.key === 'Enter') sendMessage()">
                            <button onclick="sendMessage()" class="bg-orange-600 hover:bg-orange-500 px-7 rounded-2xl font-medium">Send</button>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="lg:col-span-5 space-y-4">
                    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-5">
                        <div class="text-xs uppercase tracking-widest text-slate-500 mb-3">Quick Actions</div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="showPaymentSummary()" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl text-sm text-left">Payment Summary</button>
                            <button onclick="showTargetSummary()" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl text-sm text-left">Targets &amp; Schemes</button>
                            <button onclick="showSamplingView()" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl text-sm text-left">Sampling Status</button>
                            <button onclick="showAllRetailers()" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl text-sm text-left">All Retailers</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Retailers Sub Tab -->
        <div id="drona-sub-retailers" class="hidden">
            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6">
                <h3 class="text-xl font-semibold mb-4">Retailers</h3>
                <button onclick="openRetailerSearch()" 
                        class="bg-orange-600 hover:bg-orange-500 px-6 py-3 rounded-2xl font-medium">
                    Search Retailers
                </button>
            </div>
        </div>

        <!-- SKU Intelligence Sub Tab -->
        <div id="drona-sub-sku-intelligence" class="hidden">
            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6">
                <h3 class="text-xl font-semibold mb-4">SKU Intelligence</h3>
                <div class="flex gap-x-3 mb-4">
                    <input id="sku-search-input" type="text" placeholder="Search SKU (e.g. Pressure Cooker 5L)" 
                           class="flex-1 bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 text-sm focus:outline-none">
                    <button onclick="searchSKU()" class="bg-orange-600 hover:bg-orange-500 px-6 rounded-2xl font-medium">Search</button>
                </div>
                <div id="sku-result" class="hidden bg-slate-800 rounded-2xl p-5"></div>
            </div>
        </div>
    </div>

    <!-- STRATEGY X SECTION -->
    <div id="section-strategy-x" class="max-w-screen-xl mx-auto px-6 pt-6 hidden">
        <!-- Strategy X content will go here -->
        <div class="text-center py-10 text-slate-400">
            Strategy X section is under refinement. Coming soon.
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
    <script src="js/strategy-x.js"></script>
</body>
</html>
