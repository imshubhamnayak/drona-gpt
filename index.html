<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drona GPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .tab-active { background-color: #334155; color: white; border-radius: 9999px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

<header class="border-b border-slate-800 bg-slate-900 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex items-center justify-between h-16">
            <!-- Logo -->
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-orange-600 rounded-2xl flex items-center justify-center">
                    <span class="font-bold text-white text-2xl">D</span>
                </div>
                <span class="font-semibold text-2xl">Drona GPT</span>
            </div>

            <!-- Tabs -->
            <div class="flex gap-2 bg-slate-800 p-1 rounded-3xl">
                <button onclick="switchTab('drona')" id="tab-drona"
                        class="tab-active px-6 py-2.5 text-sm font-medium flex items-center gap-x-2">
                    <i class="fa-solid fa-comments"></i>
                    <span>Drona GPT</span>
                </button>
                <button onclick="switchTab('strategy')" id="tab-strategy"
                        class="px-6 py-2.5 text-sm font-medium flex items-center gap-x-2">
                    <i class="fa-solid fa-map-marked"></i>
                    <span>Strategy X</span>
                </button>
            </div>

            <!-- Dynamic User Header -->
            <div id="user-info" class="flex items-center gap-x-3"></div>
        </div>
    </div>
</header>

<!-- Drona GPT View (Ramesh) -->
<div id="drona-view" class="max-w-2xl mx-auto p-4 flex flex-col h-[calc(100vh-64px)]">
    <!-- Your existing Drona GPT content -->
    <div class="mb-4">
        <h2 id="greeting-main" class="text-3xl font-semibold"></h2>
        <p id="greeting-sub" class="text-slate-400"></p>
    </div>
    <!-- Chat area, quick actions, etc. -->
</div>

<!-- Strategy X View (Admin) -->
<div id="strategy-view" class="hidden flex flex-col h-[calc(100vh-64px)]">
    <!-- Your Strategy X content -->
</div>

<script src="js/main.js"></script>
</body>
</html>
